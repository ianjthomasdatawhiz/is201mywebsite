<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle Click Game</title>
    <style>
        #game-box {
            position: relative;
            width: 400px;
            height: 400px;
            border: 2px solid black;
            margin: 50px auto;
            background-color: #f0f0f0;
        }
        .circle {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: red;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .circle:hover {
            background-color: darkred;
        }
        #stats {
            text-align: center;
            margin-top: 30px;
            font-size: 20px;
            font-family: Arial, sans-serif;
        }
        .stat-item {
            margin: 10px;
            display: inline-block;
            min-width: 150px;
        }
    </style>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../styles/layout_styles.css" />
</head>
<body>
    <div class="header">
        <a href="../index.html" >Home</a>|
        <a href="../pages/resume.html">Resume</a>|
        <a href="../pages/boardgames.html">Board Games</a>|
        <a href="#">Click the circle game</a><br>
    </div>
    <div class="page">
    <header>
        <h1>Click the circle</h1>
    </header>
    <div id="game-box"></div>
    <div id="stats">
        <div class="stat-item">Clicks/Min: <span id="cpm">0</span></div>
        <div class="stat-item">High Score: <span id="high-score">0</span></div>
    </div>
    </div>

    <script>
        const gameBox = document.getElementById('game-box');
        const boxWidth = 400;
        const boxHeight = 400;
        const circleSize = 50;
        
        let clicks = 0;
        let startTime = Date.now();
        let highScore = localStorage.getItem('circleGameHighScore') || 0;
        document.getElementById('high-score').textContent = highScore;

        function updateStats() {
            const elapsedSeconds = (Date.now() - startTime) / 1000;
            const cpm = Math.round((clicks / elapsedSeconds) * 60);
            document.getElementById('cpm').textContent = cpm;
            
            if (cpm > highScore) {
                highScore = cpm;
                localStorage.setItem('circleGameHighScore', highScore);
                document.getElementById('high-score').textContent = highScore;
            }
        }

        function createCircle() {
            const circle = document.createElement('div');
            circle.className = 'circle';
            const maxX = boxWidth - circleSize;
            const maxY = boxHeight - circleSize;
            const x = Math.random() * maxX;
            const y = Math.random() * maxY;
            circle.style.left = x + 'px';
            circle.style.top = y + 'px';
            circle.addEventListener('click', () => {
                clicks++;
                updateStats();
                circle.remove();
                createCircle();
            });
            gameBox.appendChild(circle);
        }

        // Create initial circle
        createCircle();
        
        // Update stats every 100ms
        setInterval(updateStats, 100);
    </script>
</body>
</html>
